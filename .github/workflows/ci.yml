name: CI

on:
  # Trigger the workflow on push or pull request,
  # but only for the main branch
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      paths: ${{ steps.filter.outputs.paths }}
    steps:
    - uses: actions/checkout@v6
    - uses: dorny/paths-filter@v4
      id: filter
      with:
        filters: |
          paths:
            - '.github/workflows/ci.yml'
            - 'after/**'
            - 'autoload/**'
            - 'plugin/**'
            - 'test/**'

  lint:
    name: 'Lint (vint)'
    needs:
      - changes
    if: ${{ needs.changes.outputs.paths == 'true' }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@master
      with:
          python-version: 3.11
    - name: Install vint
      run: pip3 install 'setuptools<81' vim-vint
    - name: Run vint
      run: vint autoload plugin after

  tests:
    name: '${{ matrix.vim_type  }} ${{ matrix.vim_version  }} on ${{ matrix.platform  }} with cmake ${{ matrix.cmake_version }}'
    needs:
      - changes
    if: ${{ needs.changes.outputs.paths == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        vim_type: ['Vim', 'Neovim']
        vim_version: ['stable']
        cmake_version: ['3.21.7', ''] # empty means the latest version Need to support the latest cmake
        platform: ['Linux', 'MacOS', 'Windows']

        include:
          - platform: 'Linux'
            os: 'ubuntu-latest'
          - platform: 'MacOS'
            os: 'macos-latest'
          - platform: 'Windows'
            os: 'windows-latest'
          - vim_type: 'Vim'
            nvim: false
            vim_executable: vim
          - vim_type: 'Neovim'
            nvim: true
            vim_executable: nvim

    runs-on: '${{ matrix.os  }}'
    timeout-minutes: 25

    steps:
    - name: Clone CMake4Vim
      uses: actions/checkout@v6
    - name: Setup python modules
      uses: actions/setup-python@master
      with:
          python-version: 3.11
    # - name: Install covimerage
    #   run: |
    #       pip3 install 'click<7.1' 'coverage<5.0a6' covimerage
    - name: Install vim
      uses: rhysd/action-setup-vim@v1
      with:
        neovim: ${{ matrix.nvim }}
        version: ${{ matrix.vim_version  }}
    - name: Install cmake
      uses: lukka/get-cmake@latest
      with:
          cmakeVersion: ${{ matrix.cmake_version }}
          ninjaVersion: latest
    - name: Check cmake
      run: |
          which cmake
          cmake --version
    - name: Check Ninja
      run: |
          which ninja
          ninja --version
    - name: Run tests
      run: |
        python test/local_run.py --editor ${{ matrix.vim_executable }} --out_dir . # --profile
    # - name: Upload artifacts
    #   uses: actions/upload-artifact@v4
    #   with:
    #     name: coverage
    #     path: ./*.xml
    #     if-no-files-found: error

  Report:
    runs-on: ubuntu-latest
    needs: [tests]
    if: ${{ needs.changes.outputs.paths == 'true' }}

    steps:
    - uses: actions/checkout@v6
